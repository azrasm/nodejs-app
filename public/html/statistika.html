<body>

    <div class="grid-container">
    <h1>Statistika nekretnina</h1>

    <div class="unos1"  id="unosPerioda">
      <label for="periodOd1">Unesite željeni period:</label>
      <input type="text" id="periodOd1" placeholder="Donja granica perioda">
      <label for="periodDo1"></label>
      <input type="text" id="periodDo1" placeholder="Gornja granica perioda">
    </div>
  
    <div class="unos1" id="unosCijene">
      <label>Unesite željeni raspon cijene:</label>

      <label for="cijenaOd1"></label>

      <input type="text" id="cijenaDo1" placeholder="Gornja granica cijene">
      <br>
    </div>


    <div class="unos2"  class="unosPerioda">

      </div>
    
      <div class="unos2" class="unosCijene">
        <label>Unesite željeni raspon cijene:</label>
  
        <label for="cijenaOd2"></label>
        <input type="text" id="cijenaOd2" placeholder="Donja granica cijene">
        <label for="cijenaDo2"></label>
        <input type="text" id="cijenaDo2" placeholder="Gornja granica cijene">
        <br>
        <button id="drawButton">Iscrtaj histogram</button>
      </div>

    
    
    <div class="histogram">

    <div>
      <canvas id="chartCanvas"></canvas>
    </div>
    </div>
</div>

</div>
